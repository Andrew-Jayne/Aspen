name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bun pm pack --destination dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aspen.min.js
            dist/aspen.ts
            dist/*.tgz
          generate_release_notes: true
